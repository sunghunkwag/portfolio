<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sung Hun Kwag - Advanced AI Research Portfolio</title>

    <!-- SEO & Social metadata for richer previews -->
    <meta name="description" content="Portfolio of Sung Hun Kwag showcasing advanced AI research projects and open-source contributions." />
    <meta property="og:title" content="Sung Hun Kwag - Advanced AI Research Portfolio" />
    <meta property="og:description" content="Explore cutting-edge AI projects ranging from state-space models to recursive self-improvement." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://sunghunkwag.github.io/portfolio/preview.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Inline styles for a sleek, glassmorphic aesthetic -->
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Neutral */
        .bg-neutral {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Radial gradient for vignette effect */
            background: radial-gradient(circle at center, #3a3f46 0%, #12151b 100%);
            z-index: -1;
        }

        /* 3D Perspective Container */
        .full-screen-3d-stage {
            perspective: 4200px;
            perspective-origin: 50% 20%;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            pointer-events: none; /* allow underlying elements to be clickable */
            transform: translateZ(0);
        }

        .title-plate-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            pointer-events: none;
            transform: translateZ(180px) rotateX(3deg);
            contain: layout paint style;
        }

        /* Static title displayed after the slat animation finishes */
        .title-plate-static {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 15vh;
            z-index: 101;
            opacity: 0;
            pointer-events: none;
            transform: translateZ(160px);
        }

        .title-plate-static.sequence-active {
            animation: singleSequenceFade 8s cubic-bezier(0.25, 1, 0.5, 1) forwards,
                titleFloat 10s ease-in-out 2s infinite;
        }

        .title-plate-static.sequence-active .plate-main-text {
            animation: titleGlow 6s ease-out forwards;
        }

        /* Unified sequence for the static title – holds then stays visible */
        @keyframes singleSequenceFade {
            0% {
                opacity: 1;
                filter: blur(0px);
                transform: scale(1) translateZ(0);
                letter-spacing: -2px;
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 1;
                text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
                letter-spacing: -2px;
            }
        }

        @keyframes titleFloat {
            0%,
            100% {
                transform: translateZ(0) translateY(0);
            }
            50% {
                transform: translateZ(30px) translateY(-6px);
            }
        }

        /* Title typography */
        .plate-main-text {
            position: relative;
            font-size: 5vw;
            font-weight: 800;
            text-transform: none;
            letter-spacing: -2px;
            line-height: 1;
            margin: 0;
            color: #ffffff;
            text-shadow:
                0 10px 28px rgba(0, 0, 0, 0.7),
                0 0 28px rgba(79, 172, 254, 0.24),
                0 0 65px rgba(0, 242, 254, 0.2),
                0 0 110px rgba(120, 213, 255, 0.18);
        }

        @keyframes titleGlow {
            0% {
                letter-spacing: -2px;
                text-shadow:
                    0 10px 28px rgba(0, 0, 0, 0.7),
                    0 0 22px rgba(79, 172, 254, 0.18);
            }
            60% {
                letter-spacing: 0px;
                text-shadow:
                    0 16px 38px rgba(0, 0, 0, 0.68),
                    0 0 45px rgba(79, 172, 254, 0.22),
                    0 0 110px rgba(0, 242, 254, 0.22);
            }
            100% {
                letter-spacing: -1px;
                text-shadow:
                    0 12px 32px rgba(0, 0, 0, 0.72),
                    0 0 70px rgba(79, 172, 254, 0.25),
                    0 0 140px rgba(0, 242, 254, 0.2);
            }
        }

        /* Slat styles */
        .slat {
            height: 100%;
            position: relative;
            background-color: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            clip-path: inset(0px);
            transform-style: preserve-3d;
            transform-origin: left center;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            backface-visibility: hidden;
            will-change: transform;
            box-shadow:
                inset 0 0 40px rgba(255, 255, 255, 0.08),
                inset 0 0 120px rgba(79, 172, 254, 0.15),
                0 25px 60px rgba(0, 0, 0, 0.55);
        }

        .slat::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0));
            opacity: 0;
            transform: translateZ(40px);
            animation: slatSheen var(--slat-duration, 4.8s) ease-out forwards;
            animation-delay: var(--slat-delay, 0s);
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .slat::after {
            content: "";
            position: absolute;
            inset: -20%;
            background: radial-gradient(circle at 30% 20%, rgba(120, 213, 255, 0.35), rgba(0, 0, 0, 0));
            opacity: 0;
            filter: blur(18px);
            transform: translateZ(80px);
            animation: slatPulse calc(var(--slat-duration, 4.8s) * 1.15) ease-out forwards;
            animation-delay: var(--slat-delay, 0s);
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .slat-content {
            position: absolute;
            top: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 15vh;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            white-space: nowrap;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.16) 0%, rgba(3, 7, 18, 0.9) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transform: translateZ(120px);
        }

        /* Main container for name and projects */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1200px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5vh 0;
        }

        /* Hero section containing the name */
        #hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-bottom: 50px;
            pointer-events: none;
        }

        .name-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            z-index: 201;
            opacity: 0;
            transform: translateY(18px);
            animation: nameReveal 2.8s cubic-bezier(0.22, 1, 0.36, 1) 3.6s forwards;
        }

        .name-container.premium-name {
            opacity: 0;
            animation: nameReveal 2.8s ease-out 3.6s forwards, nameFloat 8s ease-in-out 6.2s infinite;
        }

        .eng-name, .kor-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 1.0);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        }

        .name-container.premium-name .eng-name,
        .name-container.premium-name .kor-name {
            text-shadow:
                0 10px 22px rgba(0, 0, 0, 0.65),
                0 0 18px rgba(79, 172, 254, 0.25),
                0 0 40px rgba(0, 242, 254, 0.18);
            animation: nameGlow 6s ease-in-out 4s infinite;
        }
        .separator {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        .eng-name,
        .kor-name,
        .separator {
            opacity: 0;
            transform: translateY(8px);
            animation: nameGlow 2.4s ease-out 3.9s forwards;
        }

        /* Projects section */
        #projects {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding-bottom: 50px;
            z-index: 200;
            position: relative;
            pointer-events: auto;
        }

        .primary-link {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px 44px;
            border-radius: 999px;
            text-decoration: none;
            color: #f8fbff;
            font-size: clamp(1rem, 2.3vw, 1.3rem);
            font-weight: 600;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.28), rgba(0, 242, 254, 0.12));
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 20px 45px rgba(0, 0, 0, 0.45),
                0 0 30px rgba(79, 172, 254, 0.3),
                inset 0 0 30px rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            overflow: hidden;
            transform-style: preserve-3d;
        }

        .primary-link::before {
            content: "";
            position: absolute;
            inset: -60%;
            background: conic-gradient(from 180deg, rgba(255, 255, 255, 0.4), rgba(79, 172, 254, 0.1), rgba(0, 242, 254, 0.35), rgba(255, 255, 255, 0.4));
            opacity: 0;
            transform: rotate(0deg);
            transition: opacity 0.3s ease;
            animation: orbitGlow 6s linear infinite;
        }

        .primary-link::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.45), transparent 60%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .primary-link span {
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .primary-link:hover {
            transform: translateY(-6px) scale(1.03);
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.55),
                0 0 45px rgba(79, 172, 254, 0.5),
                inset 0 0 40px rgba(255, 255, 255, 0.18);
        }

        .primary-link:hover::before,
        .primary-link:hover::after {
            opacity: 1;
        }

        .primary-link:active {
            transform: translateY(-2px) scale(0.99);
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(0, 242, 254, 0.7),
                inset 0 0 60px rgba(255, 255, 255, 0.25);
        }

        @keyframes orbitGlow {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes nameReveal {
            0% {
                opacity: 0;
                transform: translateY(18px) scale(0.98);
                filter: blur(6px);
            }
            60% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0px);
            }
        }

        @keyframes nameGlow {
            0%,
            100% {
                text-shadow:
                    0 10px 22px rgba(0, 0, 0, 0.65),
                    0 0 18px rgba(79, 172, 254, 0.25),
                    0 0 40px rgba(0, 242, 254, 0.18);
            }
            50% {
                text-shadow:
                    0 16px 30px rgba(0, 0, 0, 0.6),
                    0 0 28px rgba(79, 172, 254, 0.4),
                    0 0 60px rgba(0, 242, 254, 0.28);
            }
        }

        /* Animation keyframes for slats reveal */
        @keyframes fullScreenReveal {
            /* Enhanced 3D reveal with depth and overshoot for a premium feel */
            0% {
                transform: rotateY(-135deg) rotateX(8deg) translateZ(-620px) scale(1.1);
                opacity: 1;
                filter: brightness(0.45);
                background-color: rgba(255, 255, 255, 0.12);
                border-right: 1px solid rgba(255, 255, 255, 0.3);
            }
            60% {
                transform: rotateY(24deg) rotateX(-3deg) translateZ(180px) scale(1.05);
                filter: brightness(1.25) saturate(1.1);
                background-color: rgba(255, 255, 255, 0.08);
                border-right: 1px solid rgba(255, 255, 255, 0.16);
            }
            85% {
                transform: rotateY(-6deg) rotateX(2deg) translateZ(70px) scale(1.02);
                filter: brightness(1.12) saturate(1.05);
            }
            100% {
                transform: rotateY(0deg) rotateX(0deg) translateZ(0) scale(1);
                opacity: 1;
                filter: brightness(1);
                background-color: rgba(255, 255, 255, 0.05);
                border-right: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        @keyframes slatSheen {
            0% {
                opacity: 0;
            }
            55% {
                opacity: 0.18;
            }
            100% {
                opacity: 0.06;
            }
        }

        @keyframes slatPulse {
            0% {
                opacity: 0;
                transform: translateZ(40px) scale(0.9);
            }
            65% {
                opacity: 0.32;
                transform: translateZ(120px) scale(1.05);
            }
            100% {
                opacity: 0.12;
                transform: translateZ(140px) scale(1.08);
            }
        }

        /* Fade utilities */
        .fade-in-2 {
            opacity: 0;
            animation: fadeInUp 1.5s ease-out forwards;
            animation-delay: 3.5s;
        }
        .fade-in-3 {
            opacity: 0;
            animation: fadeInUp 1.5s ease-out forwards;
            animation-delay: 4.5s;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive tweaks */
        @media (max-width: 768px) {
            .plate-main-text {
                font-size: 2.5rem;
            }
            .primary-link {
                padding: 18px 32px;
                width: min(90vw, 360px);
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <!-- Dark backdrop -->
    <div class="bg-neutral" aria-hidden="true"></div>
    <!-- Main content -->
    <div class="container">
        <!-- 3D title reveal stage -->
        <div class="full-screen-3d-stage">
            <div class="title-plate-wrapper"><!-- slats inserted here via JS --></div>
            <div id="static-title-container" class="title-plate-static">
                <h1 class="plate-main-text">Intelligence Systems Research</h1>
            </div>
        </div>
        <!-- Name under the title -->
        <header id="hero">
            <div style="height: 20vh;"></div>
            <div class="name-container premium-name">
                <h2 class="eng-name">Sung Hun Kwag</h2>
                <span class="separator">|</span>
                <h2 class="kor-name">곽성훈</h2>
            </div>
        </header>
        <!-- Portfolio cards -->
        <section id="projects" class="fade-in-3">
            <a class="primary-link" href="https://github.com/sunghunkwag" target="_blank" rel="noopener noreferrer">
                <span>Visit My GitHub ✦</span>
            </a>
        </section>
    </div>
    <!-- JavaScript: build slats and fetch repo metadata -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* Configuration for slat animation */
            const NUM_SLATS = 14; // fewer slats for faster first paint
            const ANIMATION_DURATION = 3.2;
            const STAGGER_DELAY = 0.05;
            function createFullScreenSlats() {
                const wrapper = document.querySelector('.title-plate-wrapper');
                const titleTextSource = document.querySelector('#static-title-container .plate-main-text').outerHTML;
                wrapper.innerHTML = "";
                const fragment = document.createDocumentFragment();
                const screenWidth = window.innerWidth;
                const slatWidth = screenWidth / NUM_SLATS;
                for (let i = 0; i < NUM_SLATS; i++) {
                    const slat = document.createElement('div');
                    slat.classList.add('slat');
                    slat.style.width = `${slatWidth}px`;
                    slat.style.position = "absolute";
                    slat.style.left = `${i * slatWidth}px`;
                    slat.style.zIndex = 100 + i;
                    slat.style.setProperty('--slat-delay', `${i * STAGGER_DELAY}s`);
                    slat.style.setProperty('--slat-duration', `${ANIMATION_DURATION}s`);
                    const content = document.createElement('div');
                    content.classList.add('slat-content');
                    content.innerHTML = titleTextSource;
                    content.style.width = `${screenWidth}px`;
                    content.style.left = `-${i * slatWidth}px`;
                    slat.appendChild(content);
                    fragment.appendChild(slat);
                    slat.style.animation = `fullScreenReveal ${ANIMATION_DURATION}s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
                    slat.style.animationDelay = `${i * STAGGER_DELAY}s`;
                    if (i === NUM_SLATS - 1) {
                        const totalTime = (ANIMATION_DURATION + (i * STAGGER_DELAY)) * 1000;
                        setTimeout(() => {
                            wrapper.style.display = 'none';
                            const staticTitle = document.getElementById('static-title-container');
                            staticTitle.classList.add('sequence-active');
                        }, totalTime);
                    }
                }
                wrapper.appendChild(fragment);
            }
            // Initiate slats after a short delay
            requestAnimationFrame(() => {
                createFullScreenSlats();
            });
            // Dynamic metadata fetching has been removed for a cleaner presentation.
        });
    </script>
</body>

</html>
